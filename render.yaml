services:
  - type: web
    name: fincontrol-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: APP_PIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RECOVERY_EMAIL
        value: hedy131.hg@hotmail.com
      - key: BACKEND_CORS_ORIGINS
        value: '["https://fincontrol-frontend-hnu3.onrender.com"]'

  - type: web
    name: fincontrol-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://fincontrol-backend-mca0.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
