databases:
  - name: fincontrol-db
    plan: free
    databaseName: fincontrol
    user: fincontrol

services:
  - type: web
    name: fincontrol-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fincontrol-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: APP_PIN
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: '["https://fincontrol-frontend.onrender.com"]'

  - type: web
    name: fincontrol-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://fincontrol-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
